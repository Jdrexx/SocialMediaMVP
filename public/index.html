<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Social MVP</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <nav>
      <h1>Social MVP</h1>
      <div><span id="current-user">Guest</span> <button id="logout" hidden>Log out</button></div>
    </nav>
    <main>
      <aside>
        <section id="auth-panel" class="card">
          <h2>Join</h2>
          <form id="register-form">
            <input name="username" placeholder="Username" required minlength="3">
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required minlength="8">
            <button>Create account</button>
          </form>
          <h2>Log in</h2>
          <form id="login-form">
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required>
            <button>Log in</button>
          </form>
          <details>
            <summary>Password reset</summary>
            <form id="reset-request-form">
              <input name="email" type="email" placeholder="Email" required>
              <button>Get reset token</button>
            </form>
            <form id="reset-confirm-form">
              <input name="token" placeholder="Reset token" required>
              <input name="password" type="password" placeholder="New password" required minlength="8">
              <button>Reset password</button>
            </form>
          </details>
        </section>

        <section id="profile-panel" class="card" hidden>
          <h2>Profile</h2>
          <form id="profile-form">
            <textarea id="bio" name="bio" placeholder="Bio" maxlength="240"></textarea>
            <input id="avatar_url" name="avatar_url" placeholder="Avatar image URL">
            <button>Save profile</button>
          </form>
          <form id="verify-request-form">
            <button>Get email verification token</button>
          </form>
          <form id="verify-confirm-form">
            <input name="token" placeholder="Verification token">
            <button>Verify email</button>
          </form>
        </section>

        <section id="search-panel" class="card">
          <h2>Search</h2>
          <form id="search-form">
            <input name="q" placeholder="Search users/posts" minlength="2">
            <button>Search</button>
          </form>
          <div id="search-results"></div>
        </section>

        <section id="notifications-panel" class="card" hidden>
          <h2>Notifications</h2>
          <button id="mark-all-read">Mark all read</button>
          <div id="notifications"></div>
        </section>

        <section id="messages-panel" class="card" hidden>
          <h2>Messages</h2>
          <form id="message-form">
            <input name="username" placeholder="Recipient username" required>
            <textarea name="body" placeholder="Message" required></textarea>
            <button>Send message</button>
          </form>
          <div id="threads"></div>
        </section>

        <section id="admin-panel" class="card" hidden>
          <h2>Admin moderation</h2>
          <button id="load-admin">Load reports</button>
          <div id="admin-reports"></div>
        </section>
      </aside>

      <section class="timeline">
        <div id="message" class="message"></div>
        <section id="composer" class="card" hidden>
          <h2>Create post</h2>
          <form id="post-form">
            <textarea name="body" placeholder="What's happening?" maxlength="500" required></textarea>
            <input id="media-upload" name="media" type="file" accept="image/*,video/*">
            <input name="image_url" placeholder="Optional fallback image URL">
            <button>Post</button>
          </form>
        </section>
        <div class="feed-head">
          <h2 id="view-title">Public feed</h2>
          <div>
            <button id="show-feed">Show feed</button>
            <button id="follow-target" hidden></button>
          </div>
        </div>
        <section id="feed"></section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
