name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          NODE_ENV: test

      - run: npm run frontend:build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
